<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度积分调整明细查询 - 积分系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #003eb3;
        }
        #sidebar { transition: width 0.3s ease-in-out; }
        .sidebar-collapsed { width: 4rem !important; }
        .sidebar-expanded { width: 16rem !important; }
        .menu-text-hidden { display: none; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#003eb3',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#fcfdfe] text-gray-900 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-expanded bg-white border-r border-gray-200 flex flex-col h-full z-20 shadow-sm">
        <div class="h-16 flex items-center px-4 border-b border-gray-100 shrink-0">
            <div class="w-8 h-8 bg-brand rounded-sm flex items-center justify-center text-white mr-3 shadow-lg shadow-brand/20">
                <i data-lucide="award" class="w-5 h-5"></i>
            </div>
            <span class="font-bold text-lg menu-text tracking-tight">积分系统</span>
        </div>

        <nav class="flex-1 py-6 overflow-y-auto">
            <a href="index.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-brand transition-all duration-200">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">发放控制台</span>
            </a>
            <a href="approval.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-brand transition-all duration-200">
                <i data-lucide="check-square" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">调整审批</span>
            </a>
            <a href="query.html" class="flex items-center px-4 py-3 bg-blue-50 text-brand border-r-4 border-brand font-medium">
                <i data-lucide="search" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">明细查询</span>
            </a>
            <a href="import.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-brand transition-all duration-200">
                <i data-lucide="upload-cloud" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">数据导入</span>
            </a>
        </nav>

        <button onclick="toggleSidebar()" class="p-4 border-t border-gray-100 text-gray-400 hover:text-brand flex items-center justify-center transition-colors">
            <i data-lucide="chevron-left" id="toggle-icon" class="w-5 h-5 transition-transform duration-300"></i>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 z-10 shadow-sm">
            <div class="flex items-center space-x-2">
                <span class="text-gray-400 font-medium">月度积分发放</span>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
                <h1 class="text-lg font-semibold text-gray-800">明细查询</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button class="p-2 text-gray-400 hover:bg-gray-50 rounded-full transition-colors">
                    <i data-lucide="help-circle" class="w-5 h-5"></i>
                </button>
                <div class="h-8 w-[1px] bg-gray-100 mx-2"></div>
                <div class="flex items-center space-x-2">
                    <span class="text-sm font-bold text-gray-700">管理员</span>
                    <i data-lucide="chevron-down" class="w-4 h-4 text-gray-400"></i>
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-6">
            <!-- Advanced Search -->
            <section class="bg-white p-8 rounded-md border border-gray-100 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">客户手机号/证件号</label>
                        <input type="text" placeholder="输入关键字搜索" class="w-full px-4 py-2 bg-gray-50 border-none rounded-sm focus:ring-2 focus:ring-brand outline-none text-sm placeholder:text-gray-300">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">发放月份</label>
                        <input type="month" value="2026-03" class="w-full px-4 py-2 bg-gray-50 border-none rounded-sm focus:ring-2 focus:ring-brand outline-none text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">当前客户等级</label>
                        <select class="w-full px-4 py-2 bg-gray-50 border-none rounded-sm focus:ring-2 focus:ring-brand outline-none text-sm">
                            <option>全部等级</option>
                            <option>大众客户</option>
                            <option>黄金客户</option>
                            <option>白金客户</option>
                            <option>钻石客户</option>
                            <option>私行客户</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">发放状态</label>
                        <select class="w-full px-4 py-2 bg-gray-50 border-none rounded-sm focus:ring-2 focus:ring-brand outline-none text-sm">
                            <option>全部状态</option>
                            <option>待发放</option>
                            <option>发放中</option>
                            <option>已发放</option>
                            <option>发放失败</option>
                        </select>
                    </div>
                    <div class="flex items-end space-x-3">
                        <button class="flex-1 bg-brand text-white px-4 py-2 rounded-sm hover:bg-blue-700 transition-colors text-sm font-bold flex items-center justify-center">
                            <i data-lucide="search" class="w-4 h-4 mr-2"></i> 查询
                        </button>
                        <button class="px-4 py-2 border border-gray-200 rounded-sm hover:bg-gray-50 transition-colors text-sm font-bold text-gray-500">
                            重置
                        </button>
                    </div>
                </div>
            </section>

            <!-- Table Actions -->
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <h2 class="text-base font-bold text-gray-800">月度调整明细</h2>
                </div>
                <div class="flex items-center space-x-3">
                    <button class="px-4 py-2 bg-gray-50 text-gray-600 rounded-sm hover:bg-gray-100 transition-all text-sm font-bold flex items-center">
                        <i data-lucide="download" class="w-4 h-4 mr-2 text-gray-400"></i> 导出结果
                    </button>
                    <button class="px-4 py-2 border border-brand text-brand rounded-sm hover:bg-brand hover:text-white transition-all text-sm font-bold">查看易查报表</button>
                </div>
            </div>

            <!-- Query Results -->
            <div class="bg-white border border-gray-100 rounded-md shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="bg-gray-50/50 border-b border-gray-100">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">客户姓名</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">手机号</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">客户等级</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">发放月份</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">调整积分</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">发放状态</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">流水摘要</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-right">更新时间</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-100 text-sm">
                            <tr class="hover:bg-gray-50/50 transition-colors group">
                                <td class="px-6 py-4 font-bold text-gray-800">赵六</td>
                                <td class="px-6 py-4 text-gray-500">137****1111</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 bg-purple-50 text-purple-600 rounded text-[10px] font-bold border border-purple-100 uppercase">私行客户</span>
                                </td>
                                <td class="px-6 py-4 text-gray-500">2026-03</td>
                                <td class="px-6 py-4 text-green-600 font-bold">+2,500</td>
                                <td class="px-6 py-4">
                                    <span class="inline-flex items-center text-green-600 font-bold">
                                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-2"></span>
                                        已发放
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-gray-400 italic text-xs">月度积分系数调整适配补发</td>
                                <td class="px-6 py-4 text-gray-500 text-right text-xs">2026-03-18 14:20:11</td>
                            </tr>
                            <tr class="hover:bg-gray-50/50 transition-colors group">
                                <td class="px-6 py-4 font-bold text-gray-800">钱七</td>
                                <td class="px-6 py-4 text-gray-500">136****2222</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 bg-gray-50 text-gray-400 rounded text-[10px] font-bold border border-gray-100 uppercase font-mono">普通客户</span>
                                </td>
                                <td class="px-6 py-4 text-gray-500">2026-03</td>
                                <td class="px-6 py-4 text-red-500 font-bold">-150</td>
                                <td class="px-6 py-4">
                                    <span class="inline-flex items-center text-orange-500 font-bold">
                                        <span class="w-1.5 h-1.5 bg-orange-400 rounded-full mr-2"></span>
                                        待审批
                                    </span>
                                </td>
                                <td class="px-6 py-4 text-gray-400 italic text-xs">积分独立计算系数冲正</td>
                                <td class="px-6 py-4 text-gray-500 text-right text-xs">2026-03-18 10:15:45</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="px-6 py-4 bg-gray-50/50 border-t border-gray-100 flex items-center justify-between">
                    <p class="text-xs text-gray-400 font-medium">显示 1 到 10 条，共 1,245 条记录</p>
                    <div class="flex items-center space-x-2">
                        <button class="p-2 border border-gray-200 rounded hover:bg-white text-gray-400"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <button class="w-8 h-8 bg-brand text-white rounded text-xs font-bold">1</button>
                        <button class="w-8 h-8 hover:bg-white border border-transparent hover:border-gray-200 rounded text-xs font-bold text-gray-500">2</button>
                        <button class="w-8 h-8 hover:bg-white border border-transparent hover:border-gray-200 rounded text-xs font-bold text-gray-500">3</button>
                        <span class="text-gray-300">...</span>
                        <button class="w-8 h-8 hover:bg-white border border-transparent hover:border-gray-200 rounded text-xs font-bold text-gray-500">125</button>
                        <button class="p-2 border border-gray-200 rounded hover:bg-white text-gray-400"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let sidebarCollapsed = false;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleIcon = document.getElementById('toggle-icon');
            const menuTexts = document.querySelectorAll('.menu-text');
            sidebarCollapsed = !sidebarCollapsed;
            if (sidebarCollapsed) {
                sidebar.classList.remove('sidebar-expanded');
                sidebar.classList.add('sidebar-collapsed');
                toggleIcon.classList.add('rotate-180');
                menuTexts.forEach(t => t.classList.add('menu-text-hidden'));
            } else {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
                toggleIcon.classList.remove('rotate-180');
                menuTexts.forEach(t => t.classList.remove('menu-text-hidden'));
            }
        }
    </script>
</body>
</html>
