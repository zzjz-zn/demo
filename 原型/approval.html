<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度积分调整审批 - 积分系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #003eb3;
        }
        #sidebar { transition: width 0.3s ease-in-out; }
        .sidebar-collapsed { width: 4rem !important; }
        .sidebar-expanded { width: 16rem !important; }
        .menu-text-hidden { display: none; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#003eb3',
                    },
                    borderRadius: {
                        'sm': '8px',
                        'md': '12px',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#fcfdfe] text-gray-900 flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar-expanded bg-white border-r border-gray-200 flex flex-col h-full z-20 shadow-sm">
        <div class="h-16 flex items-center px-4 border-b border-gray-100 shrink-0">
            <div class="w-8 h-8 bg-brand rounded-sm flex items-center justify-center text-white mr-3 shadow-lg shadow-brand/20">
                <i data-lucide="award" class="w-5 h-5"></i>
            </div>
            <span class="font-bold text-lg menu-text tracking-tight">积分系统</span>
        </div>

        <nav class="flex-1 py-6 overflow-y-auto">
            <a href="index.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-brand transition-all duration-200 font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">发放控制台</span>
            </a>
            <a href="approval.html" class="flex items-center px-4 py-3 bg-blue-50 text-brand border-r-4 border-brand font-medium">
                <i data-lucide="check-square" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">调整审批</span>
            </a>
            <a href="query.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-brand transition-all duration-200">
                <i data-lucide="search" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">明细查询</span>
            </a>
            <a href="import.html" class="flex items-center px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-brand transition-all duration-200">
                <i data-lucide="upload-cloud" class="w-5 h-5 mr-3"></i>
                <span class="menu-text">数据导入</span>
            </a>
        </nav>

        <button onclick="toggleSidebar()" class="p-4 border-t border-gray-100 text-gray-400 hover:text-brand flex items-center justify-center transition-colors">
            <i data-lucide="chevron-left" id="toggle-icon" class="w-5 h-5 transition-transform duration-300"></i>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 z-10 shadow-sm">
            <div class="flex items-center space-x-2">
                <span class="text-gray-400 font-medium">月度积分发放</span>
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-300"></i>
                <h1 class="text-lg font-semibold text-gray-800">调整审批</h1>
            </div>
            <div class="flex items-center space-x-4">
                <div class="relative">
                    <i data-lucide="bell" class="w-5 h-5 text-gray-400"></i>
                    <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </div>
                <div class="h-8 w-[1px] bg-gray-100 mx-2"></div>
                <span class="text-sm font-bold text-gray-700">管理员</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-8 space-y-6">
            <!-- Filters -->
            <section class="bg-white p-6 rounded-md border border-gray-100 shadow-sm">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">申请月份</label>
                        <input type="month" value="2026-03" class="w-full px-4 py-2 bg-gray-50 border-none rounded-sm focus:ring-2 focus:ring-brand outline-none text-sm">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">调整类型</label>
                        <select class="w-full px-4 py-2 bg-gray-50 border-none rounded-sm focus:ring-2 focus:ring-brand outline-none text-sm">
                            <option>全部类型</option>
                            <option>调增</option>
                            <option>调减</option>
                        </select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-gray-400 uppercase">审批状态</label>
                        <select class="w-full px-4 py-2 bg-gray-50 border-none rounded-sm focus:ring-2 focus:ring-brand outline-none text-sm">
                            <option>待审批</option>
                            <option>已通过</option>
                            <option>已驳回</option>
                        </select>
                    </div>
                    <div class="flex items-end space-x-3">
                        <button class="flex-1 bg-brand text-white px-4 py-2 rounded-sm hover:bg-blue-700 transition-colors text-sm font-bold">查询</button>
                        <button class="px-4 py-2 border border-gray-200 rounded-sm hover:bg-gray-50 transition-colors text-sm font-bold text-gray-500">重置</button>
                    </div>
                </div>
            </section>

            <!-- Action Bar -->
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <h2 class="text-base font-bold text-gray-800">审批列表 <span class="ml-2 px-2 py-0.5 bg-brand/10 text-brand text-xs rounded-full font-bold">24 条待办</span></h2>
                </div>
                <div class="flex items-center space-x-3">
                    <button class="px-4 py-2 border border-brand/20 text-brand bg-brand/[0.02] rounded-sm hover:bg-brand hover:text-white transition-all text-sm font-bold">批量通过</button>
                    <button class="px-4 py-2 border border-red-100 text-red-600 bg-red-50 rounded-sm hover:bg-red-600 hover:text-white transition-all text-sm font-bold">批量驳回</button>
                </div>
            </div>

            <!-- Data Table (Simulating TanStack Table) -->
            <div class="bg-white border border-gray-100 rounded-md shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50/50 border-b border-gray-100">
                        <tr>
                            <th class="px-6 py-4 w-12 text-xs font-bold text-gray-400 uppercase">
                                <input type="checkbox" class="rounded border-gray-300 text-brand focus:ring-brand">
                            </th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">申请编号</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">客户信息</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">当前等级</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">调整分值</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">调整原因</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">申请人</th>
                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-right">操作</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100 text-sm">
                        <!-- Row 1 -->
                        <tr class="hover:bg-gray-50/50 transition-colors group">
                            <td class="px-6 py-4">
                                <input type="checkbox" class="rounded border-gray-300 text-brand focus:ring-brand">
                            </td>
                            <td class="px-6 py-4 font-mono text-xs text-gray-500">REQ-202603-001</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 rounded-full bg-blue-50 text-brand flex items-center justify-center font-bold text-xs mr-3">张</div>
                                    <div>
                                        <p class="font-bold text-gray-800">张三</p>
                                        <p class="text-xs text-gray-400">138****0001</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 bg-orange-50 text-orange-600 rounded text-[10px] font-bold border border-orange-100">钻石客户</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-green-600 font-bold">+500</span>
                            </td>
                            <td class="px-6 py-4 text-gray-500 max-w-xs truncate">善家卡月度达标奖励补发</td>
                            <td class="px-6 py-4 text-gray-500">系统自动</td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex items-center justify-end space-x-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button class="text-brand font-bold hover:underline">详情</button>
                                    <button class="text-green-600 font-bold hover:underline">通过</button>
                                    <button class="text-red-500 font-bold hover:underline">驳回</button>
                                </div>
                            </td>
                        </tr>
                        <!-- Row 2 -->
                        <tr class="hover:bg-gray-50/50 transition-colors group">
                            <td class="px-6 py-4">
                                <input type="checkbox" class="rounded border-gray-300 text-brand focus:ring-brand">
                            </td>
                            <td class="px-6 py-4 font-mono text-xs text-gray-500">REQ-202603-002</td>
                            <td class="px-6 py-4">
                                <div class="flex items-center">
                                    <div class="w-8 h-8 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center font-bold text-xs mr-3">李</div>
                                    <div>
                                        <p class="font-bold text-gray-800">李四</p>
                                        <p class="text-xs text-gray-400">139****0002</p>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 bg-blue-50 text-brand rounded text-[10px] font-bold border border-blue-100">白金客户</span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-green-600 font-bold">+1,200</span>
                            </td>
                            <td class="px-6 py-4 text-gray-500 max-w-xs truncate">客户等级切换积分差额补偿</td>
                            <td class="px-6 py-4 text-gray-500">王五</td>
                            <td class="px-6 py-4 text-right">
                                <div class="flex items-center justify-end space-x-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button class="text-brand font-bold hover:underline">详情</button>
                                    <button class="text-green-600 font-bold hover:underline">通过</button>
                                    <button class="text-red-500 font-bold hover:underline">驳回</button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div class="px-6 py-4 bg-gray-50/50 border-t border-gray-100 flex items-center justify-between">
                    <p class="text-xs text-gray-400 font-medium">显示 1 到 10 条，共 24 条记录</p>
                    <div class="flex items-center space-x-2">
                        <button class="p-2 border border-gray-200 rounded hover:bg-white text-gray-400"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                        <button class="w-8 h-8 bg-brand text-white rounded text-xs font-bold">1</button>
                        <button class="w-8 h-8 hover:bg-white border border-transparent hover:border-gray-200 rounded text-xs font-bold text-gray-500">2</button>
                        <button class="w-8 h-8 hover:bg-white border border-transparent hover:border-gray-200 rounded text-xs font-bold text-gray-500">3</button>
                        <button class="p-2 border border-gray-200 rounded hover:bg-white text-gray-400"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let sidebarCollapsed = false;
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const toggleIcon = document.getElementById('toggle-icon');
            const menuTexts = document.querySelectorAll('.menu-text');
            sidebarCollapsed = !sidebarCollapsed;
            if (sidebarCollapsed) {
                sidebar.classList.remove('sidebar-expanded');
                sidebar.classList.add('sidebar-collapsed');
                toggleIcon.classList.add('rotate-180');
                menuTexts.forEach(t => t.classList.add('menu-text-hidden'));
            } else {
                sidebar.classList.remove('sidebar-collapsed');
                sidebar.classList.add('sidebar-expanded');
                toggleIcon.classList.remove('rotate-180');
                menuTexts.forEach(t => t.classList.remove('menu-text-hidden'));
            }
        }
    </script>
</body>
</html>
