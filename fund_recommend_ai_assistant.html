<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: #F7F8FA;
        }
        .chat-container {
            max-width: 600px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .ai-bubble {
            background: #F2F3F5;
            border-radius: 0 16px 16px 16px;
        }
        .user-bubble {
            background: #007AFF;
            color: white;
            border-radius: 16px 16px 0 16px;
        }
        .product-card {
            border: 1px solid #E5E7EB;
            transition: all 0.2s;
        }
        .product-card:active {
            transform: scale(0.98);
            background-color: #F9FAFB;
        }
        .table-container {
            border: 1px solid #EDEDED;
            border-radius: 12px;
            overflow: hidden;
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .drawer-overlay {
            background: rgba(0, 0, 0, 0.5);
            transition: opacity 0.3s;
        }
        .drawer-content {
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .drawer-open .drawer-content {
            transform: translateY(0);
        }
        .filter-tag {
            border: 1px solid #E5E7EB;
            color: #6B7280;
            transition: all 0.2s;
        }
        .filter-tag.active {
            background: #EFF6FF;
            border-color: #3B82F6;
            color: #3B82F6;
            font-weight: 600;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #root:empty::before {
            content: "页面加载中，请稍候... (如果长时间未显示，请检查网络连接是否正常)";

            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #666;
            font-size: 14px;
        }

                    lucide.createIcons({
                        attrs: { class: className },
                        nameAttr: 'data-lucide',
                        icons: lucide.icons

                                                <div className="flex items-center space-x-2 text-blue-600 font-bold">
                                                    <Icon name="pie-chart" className="w-4 h-4" />
                                                    <span>5. 持仓结构</span>
                                                </div>
                                                <p className="pl-6 text-xs text-gray-600">永赢前十大持仓集中度较高(55%)，聚焦科技股；华商持仓分散度高(32%)，涵盖医药、消费及制造。</p>
                                            </section>
                                            <section className="space-y-2">
                                                <div className="flex items-center space-x-2 text-blue-600 font-bold">
                                                    <Icon name="user" className="w-4 h-4" />
                                                    <span>6. 基金经理</span>
                                                </div>
                                                <p className="pl-6 text-xs text-gray-600">永赢-高经理：4年经验，擅长科技赛道；华商-张经理：8年经验，全能均衡型选手。</p>
                                            </section>
                                            <section className="space-y-4">
                                                <div className="flex items-center space-x-2 text-blue-600 font-bold">
                                                    <Icon name="clipboard-list" className="w-4 h-4" />
                                                    <span>7. 产品总结</span>
                                                </div>
                                                <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 overflow-hidden">
                                                    <div className="flex items-center justify-between mb-4">
                                                        <div className="flex items-center space-x-2">
                                                            <div className="w-1 h-4 bg-blue-600 rounded-full"></div>
                                                            <h3 className="font-bold text-gray-900 text-xs">对比概览</h3>
                                                        </div>
                                                    </div>
                                                    <div className="bg-blue-50/50 rounded-lg p-3 mb-4 space-y-1 mx-4">
                                                        <div className="flex text-[11px] text-gray-500">
                                                            <span className="w-16 shrink-0">筛选条件:</span>
                                                            <span className="font-medium text-blue-700">近一年收益率 从高到低</span>
                                                        </div>
                                                    </div>
                                                    <div className="overflow-x-auto table-container mx-4 mb-4">
                                                        <table className="w-full text-[11px] text-left border-collapse">
                                                            <tbody className="divide-y divide-gray-100">
                                                                <tr className="bg-gray-50/50">
                                                                    <th className="py-2.5 px-3 font-semibold text-gray-600 bg-gray-50 w-24 border-r border-gray-100">基金名称/ID</th>
                                                                    <td className="py-2.5 px-3">
                                                                        <div className="font-bold text-gray-800 leading-tight">永赢科技智选C</div>
                                                                        <div className="text-gray-400 mt-0.5">015841</div>
                                                                    </td>
                                                                    <td className="py-2.5 px-3">
                                                                        <div className="font-bold text-gray-800 leading-tight">华商均衡成长A</div>
                                                                        <div className="text-gray-400 mt-0.5">012455</div>
                                                                    </td>
                                                                </tr>
                                                                <tr>
                                                                    <th className="py-2.5 px-3 font-semibold text-gray-600 bg-gray-50 w-24 border-r border-gray-100">近一年收益</th>
                                                                    <td className="py-2.5 px-3 font-bold text-red-500">32.45%</td>
                                                                    <td className="py-2.5 px-3 font-bold text-red-500">12.18%</td>
                                                                </tr>
                                                                <tr>
                                                                    <th className="py-2.5 px-3 font-semibold text-gray-600 bg-gray-50 w-24 border-r border-gray-100">风险等级</th>
                                                                    <td className="py-2.5 px-3 text-gray-600">R4 中高风险</td>
                                                                    <td className="py-2.5 px-3 text-gray-600">R3 中风险</td>
                                                                </tr>
                                                                <tr>
                                                                    <th className="py-2.5 px-3 font-semibold text-gray-600 bg-gray-50 w-24 border-r border-gray-100">产品总结</th>
                                                                    <td className="py-2.5 px-3 text-gray-500 italic leading-snug">高弹性、适合激进型投资者</td>
                                                                    <td className="py-2.5 px-3 text-gray-500 italic leading-snug">稳健均衡、适合中长期配置</td>
                                                                </tr>
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            </section>
                                        </div>
                                        <div className="flex items-center space-x-4 pt-4 border-t border-gray-50 mt-4">
                                            <button className="text-blue-500 p-1 rounded-md border border-blue-100 bg-blue-50/30">
                                                <i data-lucide="thumbs-up" className="w-4 h-4"></i>
                                            </button>
                                            <button className="text-blue-500 p-1 rounded-md border border-blue-100 bg-blue-50/30">
                                                <i data-lucide="thumbs-down" className="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'customer' && (
                            <div className="flex flex-col h-full bg-white animate-fade-in relative">
                                {/* Customer Search & Filter Bar */}
                                <div className="p-4 border-b">
                                    <div className="flex items-center space-x-3">
                                        <div className="flex items-center bg-gray-100 rounded-xl px-3 py-2 flex-1">
                                            <Icon name="search" className="w-4 h-4 text-gray-400 mr-2" />
                                            <input 
                                                type="text" 
                                                placeholder="请输入客户名称搜索" 
                                                className="bg-transparent border-none outline-none text-sm flex-1"
                                            />
                                        </div>
                                        <button 
                                            onClick={() => {
                                                setTempFilters({...appliedFilters});
                                                setIsFilterOpen(true);
                                            }}
                                            className={`flex items-center space-x-1 px-3 py-2 rounded-xl border transition-all ${hasActiveFilters ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-white border-gray-200 text-gray-600'}`}
                                        >
                                            <Icon name="filter" className="w-4 h-4" />
                                            <span className="text-sm font-medium">筛选</span>
                                        </button>
                                     </div>

                                     {/* Quick Filters */}
                                     <div className="mt-3 flex space-x-2 overflow-x-auto hide-scrollbar pb-1">
                                         {['企微客户', '玉琮客户1', '玉琮客户2', '钻石客户', '私行客户', '稳健客户'].map((tag) => (
                                             <button
                                                 key={tag}
                                                 onClick={() => {
                                                     let newTagFilter = {};
                                                     if (tag === '企微客户') newTagFilter = { isAdded: '已添加' };
                                                     else if (tag === '稳健客户') newTagFilter = { riskLevel: '稳健型' };
                                                     else newTagFilter = { customerLevel: tag };
                                                     
                                                     const updatedFilters = { ...appliedFilters, ...newTagFilter };
                                                     setAppliedFilters(updatedFilters);
                                                     setTempFilters(updatedFilters);
                                                 }}
                                                 className="px-3 py-1.5 bg-gray-50 border border-gray-100 rounded-lg text-[11px] text-gray-600 whitespace-nowrap active:bg-blue-50 active:text-blue-600 active:border-blue-100 transition-all"
                                             >
                                                 {tag}
                                             </button>
                                         ))}
                                     </div>

                                     {/* Filter Summary */}
                                    {hasActiveFilters && (
                                        <div className="mt-3 flex flex-wrap gap-2 bg-blue-50/50 rounded-lg p-2.5">
                                            <div className="w-full flex justify-between items-center mb-1">
                                                <span className="text-gray-400 font-normal text-[10px]">当前筛选:</span>
                                                <button 
                                                    onClick={() => { setAppliedFilters({}); setTempFilters({}); }}
                                                    className="text-[10px] text-blue-400 hover:text-blue-600 font-medium"
                                                >
                                                    全部清除
                                                </button>
                                            </div>
                                            {Object.entries(appliedFilters).map(([key, value]) => value && (
                                                <div key={key} className="flex items-center bg-white border border-blue-100 rounded-md px-2 py-1 text-[10px] text-blue-700 shadow-sm">
                                                    <span className="font-medium mr-1">{filterConfig[key].label}:</span>
                                                    <span>{value}</span>
                                                    <button 
                                                        onClick={() => {
                                                            const newFilters = {...appliedFilters};
                                                            delete newFilters[key];
                                                            setAppliedFilters(newFilters);
                                                            setTempFilters(newFilters);
                                                        }}
                                                        className="ml-1.5 p-0.5 hover:bg-blue-50 rounded-full transition-colors"
                                                    >
                                                        <i data-lucide="x" className="w-2.5 h-2.5 text-blue-300"></i>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="flex-1 overflow-y-auto hide-scrollbar">
                                    {customers.map((customer, index) => (
                                        <div 
                                            key={index} 
                                            onClick={() => window.location.href = `fund_list_details.html?type=customer&id=${encodeURIComponent(customer.id)}`}
                                            className="flex items-center px-4 py-4 border-b border-gray-50 active:bg-gray-50 transition-colors cursor-pointer"
                                        >
                                            <div className={`w-12 h-12 ${customer.avatarColor} rounded-full flex items-center justify-center text-white shrink-0 mr-4 shadow-sm`}>
                                                <Icon name="user" className="w-6 h-6" />
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex items-center justify-between mb-1.5">
                                                    <h4 className="font-bold text-[15px] text-gray-900 truncate">{customer.id}</h4>
                                                    <Icon name="chevron-right" className="w-4 h-4 text-gray-300" />
                                                </div>
                                                <div className="flex flex-wrap gap-1.5">
                                                    <span className="px-1.5 py-0.5 bg-gray-100 text-gray-500 text-[10px] rounded font-medium">{customer.type}</span>
                                                    <span className={`px-1.5 py-0.5 text-[10px] rounded font-medium ${customer.risk.includes('未评级') ? 'bg-red-50 text-red-400' : 'bg-orange-50 text-orange-400'}`}>{customer.risk}</span>
                                                    <span className="px-1.5 py-0.5 bg-gray-100 text-gray-500 text-[10px] rounded font-medium">{customer.level}</span>
                                                    <span className="px-1.5 py-0.5 bg-orange-50 text-orange-400 text-[10px] rounded font-medium">{customer.age}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'solution' && (
                            <div className="p-8 text-center text-gray-400 text-sm">
                                智能方案模块开发中...
                            </div>
                        )}
                    </div>

                    {/* Bottom Input Area */}
                    <div className="p-4 bg-white border-t shrink-0">
                        <div className="flex space-x-2 mb-4 overflow-x-auto hide-scrollbar pb-1">
                            {['问产品', '问客户', '问资配', '问行情'].map((text, i) => (
                                <button 
                                    key={i} 
                                    className="px-4 py-2 bg-white border border-gray-200 rounded-full text-xs font-medium text-gray-700 whitespace-nowrap shadow-sm active:bg-gray-50"
                                >
                                    {text}
                                </button>
                            ))}
                        </div>
                        <div className="flex items-center bg-gray-100 rounded-2xl px-4 py-2.5">
                            <input 
                                type="text" 
                                placeholder="有什么问题尽管问我~" 
                                className="flex-1 bg-transparent border-none outline-none text-sm"
                            />
                            <div className="flex items-center space-x-3 ml-2">
                                <Icon name="mic" className="w-5 h-5 text-gray-400" />
                                <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center shadow-md">
                                    <Icon name="arrow-up" className="w-4 h-4 text-white" />
                                </div>
                            </div>
                        </div>
                        <div className="text-[10px] text-center text-gray-300 mt-3 font-medium">内容由AI大模型生成，仅供参考，请仔细甄别</div>
                    </div>

                    {/* Floating vConsole */}
                    <div className="absolute bottom-20 right-4 px-3 py-1 bg-green-500 text-white text-[10px] font-bold rounded shadow-lg opacity-80">
                        vConsole
                    </div>

                    {/* Filter Drawer */}
                    <div className={`fixed inset-0 z-50 transition-all duration-300 ${isFilterOpen ? 'visible pointer-events-auto' : 'invisible pointer-events-none'}`}>
                        <div 
                            className={`absolute inset-0 bg-black/50 transition-opacity duration-300 ${isFilterOpen ? 'opacity-100' : 'opacity-0'}`}
                            onClick={() => setIsFilterOpen(false)}
                        ></div>
                        <div className={`absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl transition-transform duration-300 transform flex flex-col max-h-[85vh] ${isFilterOpen ? 'translate-y-0' : 'translate-y-full'}`}>
                            {/* Drawer Header */}
                            <div className="flex items-center justify-between p-5 border-b shrink-0">
                                <h2 className="text-lg font-bold text-gray-900">筛选客户</h2>
                                <button onClick={() => setIsFilterOpen(false)} className="text-gray-400">
                                    <Icon name="x" className="w-6 h-6" />
                                </button>
                            </div>

                            {/* Drawer Body */}
                            <div className="flex-1 overflow-y-auto p-5 space-y-8 hide-scrollbar">
                                {Object.entries(filterConfig).map(([key, config]) => (
                                    <div key={key} className="space-y-3">
                                        <h3 className="text-sm font-bold text-gray-900">{config.label}</h3>
                                        <div className="flex flex-wrap gap-2.5">
                                            {config.options.map(option => (
                                                <button
                                                    key={option}
                                                    onClick={() => toggleFilterOption(key, option)}
                                                    className={`px-4 py-2 rounded-xl text-xs filter-tag ${tempFilters[key] === option ? 'active' : ''}`}
                                                >
                                                    {option}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Drawer Footer */}
                            <div className="p-5 border-t flex space-x-4 bg-white shrink-0">
                                <button 
                                    onClick={resetFilters}
                                    className="flex-1 py-3.5 border border-gray-200 rounded-2xl text-sm font-bold text-gray-500 active:bg-gray-50 transition-colors"
                                >
                                    重置
                                </button>
                                <button 
                                    onClick={applyFilters}
                                    className="flex-1 py-3.5 bg-blue-600 rounded-2xl text-sm font-bold text-white shadow-lg shadow-blue-200 active:scale-[0.98] transition-all"
                                >
                                    确定
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
